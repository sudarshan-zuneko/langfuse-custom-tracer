[pytest]
# Pytest configuration for langfuse-custom-tracer

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=langfuse_custom_tracer
    --cov-report=term-missing
    --cov-report=html:htmlcov

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests (deselect with '-m "not slow"')

# Test paths
testpaths = tests

# Timeout for tests (in seconds)
timeout = 10
